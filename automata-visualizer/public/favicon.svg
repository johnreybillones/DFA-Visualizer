<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <!-- 8px Grid Minor System -->
    <pattern id="grid-minor" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#313030" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- 40px Grid Major System -->
    <pattern id="grid-major" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="url(#grid-minor)"/>
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#444748" stroke-width="1" opacity="0.4"/>
    </pattern>

    <!-- Stealth Arrowheads for Transitions -->
    <marker id="arrow-white" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 L 3 5 Z" fill="#ffffff"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 L 3 5 Z" fill="#8e9192"/>
    </marker>
  </defs>

  <!-- Deep Neutral Background -->
  <rect width="256" height="256" fill="#131313"/>
  
  <!-- Persistent Blueprint Grid -->
  <rect width="256" height="256" fill="url(#grid-major)"/>

  <!-- Blueprint Registration Marks -->
  <g fill="none" stroke="#444748" stroke-width="1">
    <path d="M 16 16 L 32 16 M 16 16 L 16 32"/>
    <path d="M 240 16 L 224 16 M 240 16 L 240 32"/>
    <path d="M 16 240 L 32 240 M 16 240 L 16 224"/>
    <path d="M 240 240 L 224 240 M 240 240 L 240 224"/>
  </g>

  <!-- Robot Schematic (Hard Depth Isometric Layering) -->
  <g stroke-linejoin="round">
    <!-- Neck / Base Pedestal -->
    <path d="M 112 208 L 128 216 L 144 208 L 144 240 L 128 248 L 112 240 Z" fill="#1c1b1b" stroke="#444748" stroke-width="2"/>
    <path d="M 128 216 L 128 248" fill="none" stroke="#444748" stroke-width="2"/>

    <!-- Main Outer Casing (Hexagon Extrusion) -->
    <!-- Top Shell -->
    <path d="M 128 56 L 208 96 L 128 136 L 48 96 Z" fill="#201f1f" stroke="#444748" stroke-width="2"/>
    <!-- Left Shell -->
    <path d="M 48 96 L 128 136 L 128 216 L 48 176 Z" fill="#0e0e0e" stroke="#444748" stroke-width="2"/>
    <!-- Right Shell -->
    <path d="M 128 136 L 208 96 L 208 176 L 128 216 Z" fill="#1c1b1b" stroke="#444748" stroke-width="2"/>

    <!-- Structural Insets (Cavities for the Automata Nodes) -->
    <!-- Top Inset -->
    <path d="M 128 72 L 184 100 L 128 128 L 72 100 Z" fill="#131313" stroke="#353534" stroke-width="2"/>
    <!-- Left Inset -->
    <path d="M 64 108 L 120 136 L 120 192 L 64 164 Z" fill="#131313" stroke="#353534" stroke-width="2"/>
    <!-- Right Inset -->
    <path d="M 136 136 L 192 108 L 192 164 L 136 192 Z" fill="#131313" stroke="#353534" stroke-width="2"/>

    <!-- Geometric Mouth Vents -->
    <path d="M 112 180 L 128 188 L 144 180 L 144 182 L 128 190 L 112 182 Z" fill="#8e9192"/>
    <path d="M 116 186 L 128 192 L 140 186 L 140 188 L 128 194 L 116 188 Z" fill="#8e9192"/>
  </g>

  <!-- Automata Edges (Connectors routing through the isometric chassis) -->
  <g fill="none" stroke-width="2">
    <!-- Initial Start Arrow to Node 1 (Left Eye) -->
    <path d="M 52 170 L 76 158" stroke="#8e9192" marker-end="url(#arrow-gray)"/>
    
    <!-- Node 1 to Node 3 (Cross-Hemisphere Connection) -->
    <path d="M 106 150 L 128 161 L 148 151" stroke="#8e9192" marker-end="url(#arrow-gray)"/>

    <!-- Node 2 (Top Brain) to Node 3 (Right Eye) -->
    <path d="M 141 106 L 164 118 L 164 134" stroke="#8e9192" marker-end="url(#arrow-gray)"/>

    <!-- Node 1 (Left Eye) to Node 2 (Top Brain) - ACTIVE PATH -->
    <path d="M 92 136 L 92 118 L 114 107" stroke="#ffffff" marker-end="url(#arrow-white)"/>

    <!-- Node 2 Self Loop - ACTIVE PATH (Dashed per system rules) -->
    <path d="M 124 88 L 112 76 L 128 68 L 136 76" stroke="#ffffff" stroke-dasharray="4 2" marker-end="url(#arrow-white)"/>
  </g>

  <!-- Small Sharp-Edged Chips (Transition Metadata Tokens) -->
  <path d="M 100 114 L 104 116 L 108 114 L 104 112 Z" fill="#ffffff"/>
  <path d="M 152 114 L 156 116 L 160 114 L 156 112 Z" fill="#8e9192"/>
  <path d="M 128 77 L 132 79 L 136 77 L 132 75 Z" fill="#ffffff"/>

  <!-- Automata Nodes (Perfect Circles anchoring the grid) -->
  <g stroke-width="2">
    <!-- Node 1: Start State (Left Face) -->
    <circle cx="92" cy="150" r="14" fill="#131313" stroke="#8e9192"/>
    
    <!-- Node 3: Accept State (Right Face - Double Circle) -->
    <circle cx="164" cy="150" r="14" fill="#131313" stroke="#8e9192"/>
    <circle cx="164" cy="150" r="9" fill="none" stroke="#8e9192"/>

    <!-- Node 2: Active Processing State (Top Face) -->
    <circle cx="128" cy="100" r="14" fill="#131313" stroke="#ffffff"/>
    <circle cx="128" cy="100" r="4" fill="#ffffff" stroke="none"/>
  </g>
</svg>
